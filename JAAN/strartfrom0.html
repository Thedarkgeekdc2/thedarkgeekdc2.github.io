<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Start From 0 💗</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f001a 0%, #1a0033 50%, #2a001f 100%);
      color: #fff;
      font-family: 'Poppins', sans-serif;
      overflow-x: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      position: relative;
      max-width: 520px;
      width: 100%;
      background: rgba(30, 20, 50, 0.35);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 28px;
      padding: 50px 40px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
      text-align: center;
      animation: fadeIn 1.2s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 3.6rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
      background: linear-gradient(90deg, #ff6b9d, #ff8fab, #ffb3c6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -1px;
    }

    .heart {
      display: inline-block;
      font-size: 2.1rem;
      margin-left: 12px;
      animation: pulse 2.2s infinite ease-in-out;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%      { transform: scale(1.25); }
    }

    p {
      font-size: 1.15rem;
      line-height: 1.7;
      color: #e0d4ff;
      margin: 18px 0;
      opacity: 0.92;
    }

    .highlight {
      color: #ff8fab;
      font-weight: 500;
    }

    .features {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 16px 24px;
      margin: 32px 0 40px;
    }

    .tag {
      background: rgba(255, 107, 157, 0.15);
      border: 1px solid rgba(255, 107, 157, 0.4);
      color: #ff9bb8;
      padding: 10px 22px;
      border-radius: 50px;
      font-size: 0.95rem;
      font-weight: 500;
      backdrop-filter: blur(6px);
      transition: all 0.3s ease;
    }

    .tag:hover {
      background: rgba(255, 107, 157, 0.3);
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(255, 107, 157, 0.25);
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 16px 48px;
      font-size: 1.2rem;
      font-weight: 500;
      color: white;
      background: linear-gradient(45deg, #ff4d6d, #ff758c, #ff9bb8);
      border: none;
      border-radius: 60px;
      cursor: pointer;
      box-shadow: 0 12px 35px rgba(255, 77, 109, 0.45);
      transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
      text-decoration: none;
    }

    .btn:hover {
      transform: translateY(-6px) scale(1.05);
      box-shadow: 0 20px 50px rgba(255, 77, 109, 0.6);
      background: linear-gradient(45deg, #ff758c, #ff9bb8, #ffc2d4);
    }

    .small-note {
      margin-top: 40px;
      font-size: 0.92rem;
      color: #b39ddb;
      opacity: 0.7;
    }

    @media (max-width: 480px) {
      .container { padding: 40px 25px; }
      h1 { font-size: 2.8rem; }
      .btn { padding: 14px 40px; font-size: 1.1rem; }
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Start From 0<span class="heart">💗</span></h1>

  <p>Main perfect nahi hoon…</p>
  <p>Par <span class="highlight">is baar sirf bolne nahi, nibhaane aaya hoon.</span></p>

  <div class="features">
    <div class="tag">Clarity ✔</div>
    <div class="tag">Respect ✔</div>
    <div class="tag">Consistency ✔</div>
    <div class="tag">No Ego ✔</div>
  </div>

  <p>Aap jaise ho, <span class="highlight">waise hi pasand ho mujhe.</span></p>
  <p>Is baar jeetna nahi… <span class="highlight">saath chalna hai.</span></p>

  <button class="btn" onclick="alert('Will you walk with me again? ❤️')">Let’s Start Again</button>

  <div class="small-note">dil se… ek nayi shuruaat</div>
</div>

</body>
</html>
